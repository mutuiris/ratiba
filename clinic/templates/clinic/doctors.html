{% extends "clinic/base.html" %}
{% block title %}Book{% endblock %}
{% block content %}
  <h1>Book an appointment</h1>
  {% for doctor in doctors %}
    <div class="card">
      <form action="{% url 'web-availability' doctor.id %}" method="get" class="card-row">
        <div class="grow">
          <strong>{{ doctor.name }}</strong>
        </div>
        <div>
          <label for="date-{{ doctor.id }}">Date</label>
          <input id="date-{{ doctor.id }}" type="date" name="date" value="{{ today }}" required>
        </div>
        <button type="submit">See availability</button>
      </form>
    </div>
  {% empty %}
    <p class="muted">No doctors yet.</p>
  {% endfor %}
{% endblock %}
