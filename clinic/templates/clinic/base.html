<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Ratiba{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    nav { margin-bottom: 1.5rem; }
    nav a { margin-right: 1rem; }
    .msg { padding: .5rem .75rem; border-radius: 4px; margin: .25rem 0; }
    .msg.success { background: #e6f4ea; }
    .msg.error { background: #fce8e6; }
    .slot { display: inline-block; margin: .2rem; }
    table { border-collapse: collapse; width: 100%; }
    td, th { border: 1px solid #ddd; padding: .4rem; text-align: left; }
    button { cursor: pointer; }
  </style>
</head>
<body>
  <nav>
    <a href="{% url 'web-doctors' %}">Doctors</a>
    <a href="{% url 'web-appointments' %}">My appointments</a>
    {% if user.is_authenticated %}
      <form action="{% url 'logout' %}" method="post" style="display:inline">
        {% csrf_token %}<button type="submit">Log out ({{ user.username }})</button>
      </form>
    {% endif %}
  </nav>

  {% for message in messages %}
    <p class="msg {{ message.tags }}">{{ message }}</p>
  {% endfor %}

  {% block content %}{% endblock %}
</body>
</html>
